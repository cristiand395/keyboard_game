services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "tail -f /dev/null"
    stdin_open: true
    tty: true
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/keyboard_game
      NEXTAUTH_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_data:/app/.next

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keyboard_game
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keyboard_game"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  node_modules:
  next_data:
