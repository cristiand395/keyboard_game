services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "mkdir -p /app/node_modules && if [ ! -d /app/node_modules/next ]; then npm install; fi && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/keyboard_game
      NEXTAUTH_URL: http://localhost:3000
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
      - ./.next:/app/.next

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: keyboard_game
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d keyboard_game"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
